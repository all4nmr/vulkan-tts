name: Build Windows

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build qwen-tts (CPU)
        run: |
          cmake -S qwentts.cpp -B build
          cmake --build build --config Release -j $env:NUMBER_OF_PROCESSORS
        shell: pwsh

      - name: Find built executables
        run: |
          $items = Get-ChildItem -Path build/ -Recurse -Include 'qwen-tts.exe','qwen-codec.exe','*.dll' | Select-Object -ExpandProperty FullName
          if ($items.Count -eq 0) { Write-Output "No files found!"; exit 1 }
          Write-Output "Found $($items.Count) files"
          $items | ForEach-Object { Write-Output "  $_" }
          
          New-Item -ItemType Directory -Force -Path package/bin | Out-Null
          $items | ForEach-Object { Copy-Item $_ -Destination package/bin/ }
        shell: pwsh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vulkan-tts-windows
          path: package/
          retention-days: 30

  create-release:
    needs: build-windows
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: vulkan-tts-windows
          path: vulkan-tts-windows

      - name: Create ZIP
        run: |
          cd vulkan-tts-windows
          zip -r ../vulkan-tts-windows.zip .
          cd ..

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: vulkan-tts-windows.zip
          generate_release_notes: true
