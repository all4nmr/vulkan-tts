name: Build Windows (Vulkan)

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install Vulkan SDK
        uses: jakoch/install-vulkan-sdk-action@v1.5.5
        with:
          vulkan_version: latest
          cache: true

      - name: Build qwen-tts (Vulkan)
        run: |
          cmake -S qwentts.cpp -B build -DGGML_VULKAN=ON
          cmake --build build --config Release -j $env:NUMBER_OF_PROCESSORS
        shell: pwsh

      - name: Package artifacts
        run: |
          New-Item -ItemType Directory -Force -Path package/scripts | Out-Null
          New-Item -ItemType Directory -Force -Path package/models | Out-Null
          New-Item -ItemType Directory -Force -Path package/bin | Out-Null
          # Copy batch launcher from repo root
          Copy-Item run-tts.bat package/ -Force
          # Copy built exes and DLLs
          $items = Get-ChildItem -Path build/ -Recurse -Include 'qwen-tts.exe','qwen-codec.exe','*.dll' | Select-Object -ExpandProperty FullName
          $items | ForEach-Object { Copy-Item $_ -Destination package/bin/ }
        shell: pwsh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vulkan-tts-windows
          path: package/
          retention-days: 30

  create-release:
    needs: build-windows
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: vulkan-tts-windows
          path: vulkan-tts-windows

      - name: Create ZIP
        run: |
          cd vulkan-tts-windows
          zip -r ../vulkan-tts-windows.zip .
          cd ..

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: vulkan-tts-windows.zip
          generate_release_notes: true
