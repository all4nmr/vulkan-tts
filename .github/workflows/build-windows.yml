name: Build Windows (Vulkan)

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install Vulkan SDK
        uses: jakoch/install-vulkan-sdk-action@v1.5.5
        with:
          vulkan_version: latest
          cache: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build qwen-tts engine (Vulkan)
        run: |
          cmake -S qwentts.cpp -B build -DGGML_VULKAN=ON
          cmake --build build --config Release -j $env:NUMBER_OF_PROCESSORS
        shell: pwsh

      - name: Build Tauri GUI (ScrappyVox MSI)
        continue-on-error: true
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ""
        run: |
          cd gui
          npm ci
          npx tauri build --bundles msi
          echo "Tauri build complete"

      - name: Package artifacts
        run: |
          New-Item -ItemType Directory -Force -Path package/scripts | Out-Null
          New-Item -ItemType Directory -Force -Path package/models | Out-Null
          New-Item -ItemType Directory -Force -Path package/bin | Out-Null
          New-Item -ItemType Directory -Force -Path package/gui | Out-Null
          # Copy batch launcher from repo root
          Copy-Item run-tts.bat package/ -Force
          Copy-Item sample-korean.txt package/ -Force
          Copy-Item voice-clone.txt package/ -Force
          # Copy built exes and DLLs
          $items = Get-ChildItem -Path build/ -Recurse -Include 'qwen-tts.exe','qwen-codec.exe','*.dll' | Select-Object -ExpandProperty FullName
          $items | ForEach-Object { Copy-Item $_ -Destination package/bin/ }
          # Copy Tauri GUI portable EXE (runs without MSI installation)
          if (Test-Path 'gui/src-tauri/target/release/scrappyvox.exe') {
            Copy-Item gui/src-tauri/target/release/scrappyvox.exe -Destination package/gui/ScrappyVox.exe
            Write-Host "Portable GUI found: scrappyvox.exe"
          }
          # Copy Tauri GUI MSI installer (if built successfully)
          $msi = Get-ChildItem -Path gui/src-tauri/target/release/bundle/msi/ -Filter '*.msi' -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($msi) {
            Copy-Item $msi.FullName -Destination package/gui/
            Write-Host "MSI found: $($msi.Name)"
          } else {
            Write-Host "No MSI found - Tauri GUI build may have failed. CLI tools still included."
          }
        shell: pwsh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: scrappyvox-windows
          path: package/
          retention-days: 30

  create-release:
    needs: build-windows
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: scrappyvox-windows
          path: scrappyvox-windows

      - name: Create ZIP
        run: |
          cd scrappyvox-windows
          zip -r ../scrappyvox-windows.zip .
          cd ..

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: scrappyvox-windows.zip
          generate_release_notes: true
